name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v2.1.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: HEICShift-Windows.exe
            pyinstaller_args: --onefile --windowed --name HEICShift
          - os: macos-latest
            artifact: HEICShift-macOS
            pyinstaller_args: --onefile --windowed --name HEICShift
          - os: ubuntu-latest
            artifact: HEICShift-Linux
            pyinstaller_args: --onefile --name HEICShift

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller Pillow pillow-heif PyQt6
          pip install pillow-jxl-plugin || true
          pip install rawpy || true
          pip install qoi || true

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.pyinstaller_args }} heicshift.py

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/HEICShift dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/HEICShift.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.version != ''

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "HEICShift ${{ github.event.inputs.version }}" \
            --generate-notes \
            || true
          gh release upload "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            artifacts/*
